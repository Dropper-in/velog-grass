name: Update Blog Posts
  

on:
  push:
      branches:
        - main
  schedule:
    - cron: '0 14 * * *'

jobs:
  update_blog:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Push changes
      run: |
        git config --global user.name 'Dropper-in'
        git config --global user.email '${{ secrets.GH_EMAIL }}'
        git push https://${{ secrets.GH_PAT }}@github.com/Dropper-in/velog-grass.git 

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install feedparser gitpython

    - name: Run script
      run: python scripts/update_blog.py